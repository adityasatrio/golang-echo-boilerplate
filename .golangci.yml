run:
  timeout: 5m
  skip-dirs:
    - ent
    - mocks
    - cmd/docs

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - exportloopref
    - gocritic
    - gosec
    - makezero
    - nilerr
    - prealloc
    - predeclared
    - revive
    - unconvert
    - unparam
    - wastedassign

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    enable-all: true
    disable:
      - fieldalignment
  gosec:
    excludes:
      - G101
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
    disabled-checks:
      - ifElseChain
      - hugeParam
  revive:
    rules:
      - name: unexported-return
        disabled: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - bodyclose
        - unparam
    - path: ent/
      linters:
        - all
    - path: mocks/
      linters:
        - all
    - path: cmd/docs/
      linters:
        - all

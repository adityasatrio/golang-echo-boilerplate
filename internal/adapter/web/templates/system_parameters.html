{{define "system_parameters.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <title>System Parameters - myapp</title>
  {{template "head" .}}
</head>
<body>
  {{template "nav" .}}
  <div class="page-container">
    <div class="page-header">
      <h1>System Parameters</h1>
      {{if .IsAdmin}}
      <button class="button-dark" hx-get="/system-parameters/new" hx-target="#modal-root" hx-swap="innerHTML">+ New Parameter</button>
      {{end}}
    </div>
    <table class="data-table">
      <thead>
        <tr>
          <th>Key</th>
          <th>Value</th>
          {{if .IsAdmin}}<th></th>{{end}}
        </tr>
      </thead>
      <tbody id="system-parameter-table-body">
        {{range .Params}}{{template "system_parameter_row" .}}{{end}}
      </tbody>
    </table>
  </div>
  <div id="modal-root"></div>
</body>
</html>
{{end}}
